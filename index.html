<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Inspección Rápida</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f5f5f5; color: #333; margin: 0; padding: 20px; text-align: center;">

    <div style="background-color: #fff; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <header style="margin-bottom: 30px;">
            <h1 id="vehicle-name" style="font-size: 24px; margin: 0 0 5px; color: #2e68ff;">Cargando vehículo...</h1>
            <p style="margin: 0; color: #666; font-size: 14px;">Lista de defectos asignada</p>
        </header>

        <main id="app-content">
            <div id="loading" style="display: block; font-size: 18px; color: #666; padding: 40px 0;">Cargando datos...</div>
            
            <div id="inspection-form" style="display: none;">
                <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                    <button id="btn-safe" style="padding: 20px; background-color: #43a047; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(67, 160, 71, 0.2); width: 100%;">Vehículo Seguro (Sin Defectos)</button>
                    <button id="btn-show-defects" style="padding: 15px; background-color: transparent; color: #2e68ff; border: 2px solid #2e68ff; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;">Reportar Defectos</button>
                </div>

                <div id="defects-container" style="display: none; background-color: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-top: 20px;">
                    <h3 style="margin-top: 0; font-size: 18px; text-align: left;">Selecciona los defectos:</h3>
                    <ul id="defects-list" style="list-style-type: none; padding: 0; margin: 0 0 20px 0; text-align: left;">
                        <!-- Generado por JS -->
                    </ul>
                    
                    <div style="margin-top: 20px; text-align: left;">
                        <label for="inspection-comments" style="display: block; margin-bottom: 8px; font-weight: bold;">Comentarios adicionales:</label>
                        <textarea id="inspection-comments" rows="3" placeholder="Añade algún comentario..." style="width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; resize: vertical;"></textarea>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                        <button id="btn-submit-defects" style="padding: 20px; background-color: #e53935; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(229, 57, 53, 0.2); width: 100%;">Enviar Inspección con Defectos</button>
                    </div>
                </div>
            </div>
            
            <div id="success-message" style="display: none; padding: 40px 20px;">
                <div style="font-size: 60px; color: #43a047; margin-bottom: 20px;">✓</div>
                <h2>Inspección Registrada</h2>
                <p>La inspección se ha enviado correctamente.</p>
                <button id="btn-reset" style="padding: 15px; background-color: transparent; color: #2e68ff; border: 2px solid #2e68ff; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%;">Nueva Inspección</button>
            </div>
            
            <div id="error-message" style="display: none;">
                <h2>Error</h2>
                <p id="error-text">Ocurrió un error al enviar la inspección.</p>
                <button id="btn-retry" style="padding: 15px; background-color: transparent; color: #2e68ff; border: 2px solid #2e68ff; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;">Reintentar</button>
            </div>
        </main>
    </div>

    <script>
        geotab.addin.DriveAppLink = function (api, state) {
            let currentDevice = null;
            let currentDriver = null;
            const defectListId = 'b28E9'; 
            
            let elVehicleName = null;
            let elLoading = null;
            let elInspectionForm = null;
            let elDefectsContainer = null;
            let elDefectsList = null;
            let elSuccessMessage = null;
            let elErrorMessage = null;
            let elErrorText = null;
            var knownDefectIds = {}; // IDs de defectos de la lista b28E9

            const renderDefects = function() {
                elDefectsList.innerHTML = '';
                
                var debugLog = function(msg) {
                    if (document.getElementById('loading')) {
                        var p = document.createElement('p');
                        p.style.fontSize = '11px';
                        p.style.color = '#666';
                        p.textContent = msg;
                        document.getElementById('loading').appendChild(p);
                    }
                };

                debugLog("- Solicitando Defect API...");

                // defectListSearch devuelve TODAS las listas (ignora el ID en Drive API)
                // Filtramos el array para encontrar la lista b28E9 por su ID
                try {
                    api.call('Get', {
                        typeName: 'Defect',
                        search: { defectListSearch: { id: defectListId } }
                    }, function(allGroups) {
                        debugLog("- Respuesta Defect OK: " + (allGroups ? allGroups.length : 'nulo'));

                        if (!allGroups || allGroups.length === 0) {
                            elDefectsList.innerHTML = '<li style="padding:12px 0;">No se encontraron listas de defectos.</li>';
                            elLoading.style.display = 'none';
                            elInspectionForm.style.display = 'block';
                            return;
                        }

                        // Buscar la entrada cuyo ID coincide con b28E9
                        var targetGroup = null;
                        for (var i = 0; i < allGroups.length; i++) {
                            if (allGroups[i].id === defectListId) {
                                targetGroup = allGroups[i];
                                break;
                            }
                        }

                        debugLog("- targetGroup encontrado: " + (targetGroup ? 'SÍ' : 'NO'));

                        if (!targetGroup) {
                            elDefectsList.innerHTML = '<li style="padding:12px 0;">Lista b28E9 no encontrada entre los resultados.</li>';
                            elLoading.style.display = 'none';
                            elInspectionForm.style.display = 'block';
                            return;
                        }

                        // Guardar los IDs del grupo encontrado para filtrar logs anteriores
                        knownDefectIds = {};
                        var defects = targetGroup.children || [];
                        if (defects.length === 0) {
                            defects = [targetGroup];
                        }
                        
                        debugLog("- Extrayendo defects. Cantidad: " + defects.length);

                        // Indexar todos los IDs (incluyendo hijos anidados)
                        function indexDefects(items) {
                            items.forEach(function(d) {
                                knownDefectIds[d.id] = true;
                                if (d.children && d.children.length > 0) {
                                    indexDefects(d.children);
                                }
                            });
                        }
                        
                        try {
                            indexDefects(defects);
                            debugLog("- Indexado completo");
                            renderDefectItems(defects);
                            debugLog("- Render finalizado");
                        } catch(e) {
                            debugLog("- ERROR en indexDefects/render: " + e.message);
                        }
                        
                    }, function(error) {
                        debugLog("- Error API Defect: " + error.message);
                        showError('Error cargando defectos: ' + (error.message || error));
                    });
                } catch(globalError) {
                    debugLog("- Excepción síncrona API Defect: " + globalError.message);
                }
            };

            var renderDefectItems = function(defects) {
                elDefectsList.innerHTML = '';

                defects.forEach(function(item) {
                    if (item.children && item.children.length > 0) {
                        // Categoría con hijos → mostrar encabezado + checkboxes indentados
                        var header = document.createElement('li');
                        header.style.padding = '14px 0 4px 0';
                        header.style.fontWeight = 'bold';
                        header.style.color = '#444';
                        header.style.fontSize = '14px';
                        header.style.letterSpacing = '0.5px';
                        header.style.borderBottom = '2px solid #e0e0e0';
                        header.style.listStyle = 'none';
                        header.textContent = '▸ ' + item.name;
                        elDefectsList.appendChild(header);

                        item.children.forEach(function(child) {
                            var li = document.createElement('li');
                            li.style.padding = '10px 0 10px 20px';
                            li.style.borderBottom = '1px solid #f0f0f0';
                            li.style.display = 'flex';
                            li.style.alignItems = 'center';

                            var checkbox = document.createElement('input');
                            checkbox.type = 'checkbox';
                            checkbox.id = 'defect-' + child.id;
                            checkbox.value = child.id;
                            checkbox.className = 'defect-checkbox';
                            checkbox.style.width = '22px';
                            checkbox.style.height = '22px';
                            checkbox.style.marginRight = '14px';
                            checkbox.style.flexShrink = '0';

                            var label = document.createElement('label');
                            label.htmlFor = 'defect-' + child.id;
                            label.textContent = child.name;
                            label.style.cursor = 'pointer';
                            label.style.fontSize = '15px';

                            li.appendChild(checkbox);
                            li.appendChild(label);
                            elDefectsList.appendChild(li);
                        });

                    } else {
                        // Categoría sin hijos → es ella misma el defecto a marcar
                        var li = document.createElement('li');
                        li.style.padding = '12px 0';
                        li.style.borderBottom = '1px solid #eee';
                        li.style.display = 'flex';
                        li.style.alignItems = 'center';

                        var checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.id = 'defect-' + item.id;
                        checkbox.value = item.id;
                        checkbox.className = 'defect-checkbox';
                        checkbox.style.width = '24px';
                        checkbox.style.height = '24px';
                        checkbox.style.marginRight = '15px';
                        checkbox.style.flexShrink = '0';

                        var label = document.createElement('label');
                        label.htmlFor = 'defect-' + item.id;
                        label.textContent = item.name;
                        label.style.cursor = 'pointer';
                        label.style.fontWeight = 'bold';

                        li.appendChild(checkbox);
                        li.appendChild(label);
                        elDefectsList.appendChild(li);
                    }
                });

                elLoading.style.display = 'none';
                elInspectionForm.style.display = 'block';
            };


            const submitDVIR = function(isSafe) {
                elInspectionForm.style.display = 'none';
                elLoading.style.display = 'block';

                var debugLog = function(msg) {
                    var p = document.createElement('p');
                    p.style.fontSize = '11px';
                    p.style.color = '#aa5500'; // Naranja oscuro
                    p.innerHTML = '<i>SUBMIT:</i> ' + msg;
                    elLoading.appendChild(p);
                };

                debugLog("Iniciando envío. Vehículo seguro = " + isSafe);

                var remark = document.getElementById('inspection-comments').value;
                var newlySelectedIds = [];
                if (!isSafe) {
                    var checked = Array.from(document.querySelectorAll('.defect-checkbox:checked'));
                    if (checked.length === 0) {
                        showError('Selecciona al menos un defecto.');
                        return;
                    }
                    newlySelectedIds = checked.map(function(cb) { return cb.value; });
                    debugLog(newlySelectedIds.length + " defectos seleccionados.");
                }

                // Rango sensato (30 días) para encontrar logs previos sin colapsar Drive
                var fromDate = new Date(Date.now() - 30 * 24 * 3600000).toISOString();
                var toDate = new Date().toISOString();

                debugLog("Consultando inspecciones previas (30 días)...");

                try {
                    api.call('Get', {
                        typeName: 'DVIRLog',
                        search: {
                            deviceSearch: { id: currentDevice.id },
                            fromDate: fromDate,
                            toDate: toDate
                        }
                    }, function(logs) {
                        debugLog("DVIRLog Get OK. Resultados: " + (logs ? logs.length : 0));
                        
                        try {
                            var previousUnresolved = [];
                            if (logs && logs.length > 0) {
                                var lastLog = logs.reduce(function(latest, log) {
                                    return (new Date(log.dateTime) > new Date(latest.dateTime)) ? log : latest;
                                }, logs[0]);

                                var prevDefects = lastLog.dVIRDefects || lastLog.defectRemarks || lastLog.defects || [];
                                prevDefects.forEach(function(dr) {
                                    // Los defectos marcados como NotNecessary también están "resueltos", no deben heredarse.
                                    if (dr.repairStatus !== 'Repaired' && dr.repairStatus !== 'NotNecessary') {
                                        var isAlreadySelected = false;
                                        if (dr.defect && dr.defect.id && newlySelectedIds.indexOf(dr.defect.id) !== -1) {
                                            isAlreadySelected = true;
                                        }

                                        if (!isAlreadySelected) {
                                            var carriedDefect = {
                                                repairStatus: dr.repairStatus || 'NotRepaired'
                                            };
                                            if (dr.defect) carriedDefect.defect = { id: dr.defect.id };
                                            if (dr.part) carriedDefect.part = { id: dr.part.id };
                                            // Eliminamos por completo la herencia de repairUser aquí, porque si es NotRepaired nunca tiene repairUser.

                                            previousUnresolved.push(carriedDefect);
                                        }
                                    }
                                });
                            }

                            // Preparar el conductor asegurando que tiene un id válido
                            var driverIdToUse = 'UnknownDriverId';
                            if (currentDriver && currentDriver.id) {
                                driverIdToUse = currentDriver.id;
                            } else if (state && state.driverId) {
                                driverIdToUse = state.driverId;
                            }

                            // Validación súper estricta: Si el ID de driver parece un correo o nombre en lugar de un ID interno, forzamos un rescate
                            if (driverIdToUse.indexOf('@') !== -1 || driverIdToUse.indexOf(' ') !== -1 || (driverIdToUse !== 'UnknownDriverId' && driverIdToUse.indexOf('b') !== 0 && driverIdToUse.length > 10)) {
                                debugLog("- AVISO: El id de conductor parecía un email/nombre (" + driverIdToUse + "). Buscándolo activamente...");
                                // Hacemos un rescate síncrono engañoso dentro del flujo asíncrono para no colapsar la app en este punto crítico.
                                // Ya que estamos aquí, la única salida segura es intentar enviar sin el conductor mal formado, pero el Add() fallará
                                // Por tanto, delegamos al bloque catch de la API para que maneje el error, o mejor, lanzamos excepción:
                                throw new Error("ID de conductor inválido detectado: " + driverIdToUse);
                            }

                            var defectLog = {
                                device: { id: currentDevice ? currentDevice.id : 'NoDeviceId' },
                                driver: { id: driverIdToUse },
                                dateTime: new Date().toISOString(),
                                isSafeToOperate: isSafe,
                                defectList: { id: defectListId },
                                remark: remark || ''
                            };

                            if (!isSafe) {
                                var newDefects = newlySelectedIds.map(function(id) {
                                    return { defect: { id: id }, remark: '', repairStatus: 'NotRepaired' };
                                });
                                defectLog.dVIRDefects = newDefects.concat(previousUnresolved);
                            } else if (previousUnresolved.length > 0) {
                                defectLog.dVIRDefects = previousUnresolved;
                            }

                            api.call('Add', {
                                typeName: 'DVIRLog',
                                entity: defectLog
                            }, function() {
                                debugLog("Add completado. Redirigiendo a éxito.");
                                elLoading.style.display = 'none';
                                elSuccessMessage.style.display = 'block';
                            }, function(error) {
                                debugLog("ERROR en Add DVIRLog: " + (error.message || error));
                                showError('No se pudo enviar la inspección: ' + (error.message || error));
                            });

                        } catch (submitErr) {
                            debugLog("Excepción en armado datos: " + submitErr.message);
                            showError('Error en armado datos: ' + submitErr.message);
                        }
                    }, function(getError) {
                        debugLog("ERROR en Get DVIRLog: " + getError.message);
                        showError('Error recuperando historial: ' + (getError.message || getError));
                    });
                } catch(globalError) {
                    debugLog("Excepción API DVIRLog: " + globalError.message);
                    showError('Error en API DVIRLog: ' + globalError.message);
                }
            };

            const showError = (msg) => {
                elLoading.style.display = 'none';
                elInspectionForm.style.display = 'none';
                elErrorText.textContent = msg;
                elErrorMessage.style.display = 'block';
            };

            return {
                initialize: function (api, state, callback) {
                    elVehicleName = document.getElementById('vehicle-name');
                    elLoading = document.getElementById('loading');
                    elInspectionForm = document.getElementById('inspection-form');
                    elDefectsContainer = document.getElementById('defects-container');
                    elDefectsList = document.getElementById('defects-list');
                    elSuccessMessage = document.getElementById('success-message');
                    elErrorMessage = document.getElementById('error-message');
                    elErrorText = document.getElementById('error-text');

                    document.getElementById('btn-show-defects').addEventListener('click', () => {
                        elDefectsContainer.style.display = 'block';
                        document.getElementById('btn-show-defects').style.display = 'none';
                    });
                    
                    document.getElementById('btn-safe').addEventListener('click', () => {
                        if(confirm("¿Confirmas que el vehículo es seguro y no tiene defectos?")) {
                            submitDVIR(true);
                        }
                    });
                    
                    document.getElementById('btn-submit-defects').addEventListener('click', () => {
                        submitDVIR(false);
                    });
                    
                    document.getElementById('btn-reset').addEventListener('click', () => {
                        document.getElementById('btn-show-defects').style.display = 'block';
                        elDefectsContainer.style.display = 'none';
                        Array.from(document.querySelectorAll('.defect-checkbox')).forEach(cb => cb.checked = false);
                        document.getElementById('inspection-comments').value = '';
                        elSuccessMessage.style.display = 'none';
                        elInspectionForm.style.display = 'block';
                    });
                    
                    document.getElementById('btn-retry').addEventListener('click', () => {
                        elErrorMessage.style.display = 'none';
                        elInspectionForm.style.display = 'block';
                    });

                    callback();
                },
                focus: function (api, state) {
                    currentDevice = state.device || (state.deviceInfo && state.deviceInfo.device) || state.activeDevice || state.activeVehicle;

                    elSuccessMessage.style.display = 'none';
                    elErrorMessage.style.display = 'none';
                    elInspectionForm.style.display = 'none';
                    elLoading.style.display = 'block';
                    var debugLog = function(msg) {
                        if (elLoading) {
                            var p = document.createElement('p');
                            p.style.fontSize = '11px';
                            p.style.color = '#666';
                            p.textContent = msg;
                            elLoading.appendChild(p);
                        }
                    };

                    debugLog("- Empezando focus...");

                    if (!currentDevice || !currentDevice.id) {
                        elVehicleName.innerHTML = 'No hay un vehículo seleccionado.<br><small style="font-size:12px;">Selecciona un vehículo en Drive primero.</small>';
                        elLoading.style.display = 'none';
                        return;
                    }

                    debugLog("- Vehículo OK: " + currentDevice.id);

                    // Intentar obtener conductor del estado primero
                    var rawDriver = state.driver || (state.deviceInfo && state.deviceInfo.driver) || state.driverId;
                    var currentDriver = null;
                    
                    if (typeof rawDriver === 'string') {
                        // Geotab Drive a veces envía el nombre de usuario (email) como un string en lugar del objeto driver. 
                        // Los IDs internos siempre empiezan por 'b' (ex: b2A). Si tiene arroba o no es 'b...', descartar y dejar que el fallback lo resuelva con API
                        if (rawDriver.indexOf('@') === -1 && rawDriver.indexOf('b') === 0) {
                            currentDriver = { id: rawDriver };
                        } else {
                            debugLog("- state.driver no es un ID válido. Delegando a API session...");
                        }
                    } else if (rawDriver && rawDriver.id) {
                        if (rawDriver.id.indexOf('@') === -1 && rawDriver.id.indexOf('b') === 0) {
                            currentDriver = rawDriver;
                        } else {
                            debugLog("- state.driver.id no es válido. Delegando a API session...");
                        }
                    }

                    debugLog("- Raw driver pre-verificado: " + (currentDriver ? currentDriver.id : 'nulo (fallback activo)'));

                    // Si no está en el estado, obtener el usuario logueado via API
                    var loadApp = function(driverObj) {
                        debugLog("- Ejecutando loadApp...");
                        currentDriver = driverObj;

                        api.call('Get', {
                            typeName: 'Device',
                            search: { id: currentDevice.id }
                        }, function(devices) {
                            if (devices && devices.length > 0) {
                                elVehicleName.textContent = devices[0].name || 'Vehículo ' + currentDevice.id;
                            } else {
                                elVehicleName.textContent = 'Vehículo ' + currentDevice.id;
                            }
                        }, function() {
                            elVehicleName.textContent = 'Vehículo ' + currentDevice.id;
                        });

                        debugLog("- Pasando a renderDefects...");
                        renderDefects();
                    };

                    if (currentDriver && currentDriver.id) {
                        debugLog("- Llamando loadApp directo.");
                        loadApp(currentDriver);
                    } else {
                        debugLog("- Buscando driver de respaldo...");
                        // Usar el callback asíncrono nativo de getSession
                        var fallbackToDriverChange = function() {
                            debugLog("- Iniciando fetchFallback(DriverChange)...");
                            api.call('Get', {
                                typeName: 'DriverChange',
                                search: {
                                    deviceSearch: { id: currentDevice.id },
                                    fromDate: new Date(Date.now() - 3600000).toISOString()
                                }
                            }, function(changes) {
                                if (changes && changes.length > 0 && changes[0].driver && changes[0].driver.id) {
                                    loadApp(changes[0].driver);
                                } else {
                                    // NO PODEMOS USAR UnknownDriverId.
                                    // Si todo falla, forzamos la búsqueda de cualquier usuario activo como último y desesperado recurso
                                    api.call('Get', { typeName: 'User', resultsLimit: 1 }, function(anyUsers) {
                                        if (anyUsers && anyUsers.length > 0) {
                                            debugLog("- ADVERTENCIA: Usando un usuario genérico.");
                                            loadApp({ id: anyUsers[0].id });
                                        } else {
                                            debugLog("- ERROR FATAL: No drivers found.");
                                        }
                                    });
                                }
                            }, function() {
                                // Mismo fallback en caso de error
                                api.call('Get', { typeName: 'User', resultsLimit: 1 }, function(anyUsers) {
                                    if (anyUsers && anyUsers.length > 0) {
                                        debugLog("- ADVERTENCIA: Usando usuario tras error HTTP.");
                                        loadApp({ id: anyUsers[0].id });
                                    }
                                });
                            });
                        };

                        try {
                            if (typeof api.getSession === 'function') {
                                api.getSession(function(credentials, server) {
                                    var userName = '';
                                    if (credentials && credentials.userName) {
                                        userName = credentials.userName;
                                    } else if (server) { // a veces server contiene el objeto
                                        userName = server.userName || '';
                                    }
                                    
                                    debugLog("- Session detectada. User: " + userName);
                                    
                                    if (userName) {
                                        api.call('Get', {
                                            typeName: 'User',
                                            search: { name: userName }
                                        }, function(users) {
                                            if (users && users.length > 0) {
                                                loadApp({ id: users[0].id });
                                            } else {
                                                fallbackToDriverChange();
                                            }
                                        }, function() { fallbackToDriverChange(); });
                                    } else {
                                        fallbackToDriverChange();
                                    }
                                });
                            } else {
                                fallbackToDriverChange();
                            }
                        } catch(e) {
                            debugLog("- Excepción getSession: " + e.message);
                            fallbackToDriverChange();
                        }
                    }
                },
                blur: function (api, state) {}
            };
        };
        // Alias de compatibilidad
        geotab.addin.DriveDVIR = geotab.addin.DriveAppLink;
    </script>
</body>
</html>
