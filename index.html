<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Inspección Rápida</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f5f5f5; color: #333; margin: 0; padding: 20px; text-align: center;">

    <div style="background-color: #fff; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <header style="margin-bottom: 30px;">
            <h1 id="vehicle-name" style="font-size: 24px; margin: 0 0 5px; color: #2e68ff;">Cargando vehículo...</h1>
            <p style="margin: 0; color: #666; font-size: 14px;">Lista de defectos asignada</p>
        </header>

        <main id="app-content">
            <div id="loading" style="display: block; font-size: 18px; color: #666; padding: 40px 0;">Cargando datos...</div>
            
            <div id="inspection-form" style="display: none;">
                <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                    <button id="btn-safe" style="padding: 20px; background-color: #43a047; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(67, 160, 71, 0.2); width: 100%;">Vehículo Seguro (Sin Defectos)</button>
                    <button id="btn-show-defects" style="padding: 15px; background-color: transparent; color: #2e68ff; border: 2px solid #2e68ff; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;">Reportar Defectos</button>
                </div>

                <div id="defects-container" style="display: none; background-color: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-top: 20px;">
                    <h3 style="margin-top: 0; font-size: 18px; text-align: left;">Selecciona los defectos:</h3>
                    <ul id="defects-list" style="list-style-type: none; padding: 0; margin: 0 0 20px 0; text-align: left;">
                        <!-- Generado por JS -->
                    </ul>
                    
                    <div style="margin-top: 20px; text-align: left;">
                        <label for="inspection-comments" style="display: block; margin-bottom: 8px; font-weight: bold;">Comentarios adicionales:</label>
                        <textarea id="inspection-comments" rows="3" placeholder="Añade algún comentario..." style="width: 100%; box-sizing: border-box; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; resize: vertical;"></textarea>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                        <button id="btn-submit-defects" style="padding: 20px; background-color: #e53935; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(229, 57, 53, 0.2); width: 100%;">Enviar Inspección con Defectos</button>
                    </div>
                </div>
            </div>
            
            <div id="success-message" style="display: none; padding: 40px 20px;">
                <div style="font-size: 60px; color: #43a047; margin-bottom: 20px;">✓</div>
                <h2>Inspección Registrada</h2>
                <p>La inspección se ha enviado correctamente.</p>
                <button id="btn-reset" style="padding: 15px; background-color: transparent; color: #2e68ff; border: 2px solid #2e68ff; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%;">Nueva Inspección</button>
            </div>
            
            <div id="error-message" style="display: none;">
                <h2>Error</h2>
                <p id="error-text">Ocurrió un error al enviar la inspección.</p>
                <button id="btn-retry" style="padding: 15px; background-color: transparent; color: #2e68ff; border: 2px solid #2e68ff; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;">Reintentar</button>
            </div>
        </main>
    </div>

    <script>
        geotab.addin.DriveAppLink = function (api, state) {
            let currentDevice = null;
            let currentDriver = null;
            const defectListId = 'b28E9'; 
            
            let elVehicleName = null;
            let elLoading = null;
            let elInspectionForm = null;
            let elDefectsContainer = null;
            let elDefectsList = null;
            let elSuccessMessage = null;
            let elErrorMessage = null;
            let elErrorText = null;

            const renderDefects = () => {
                elDefectsList.innerHTML = '';
                
                api.call("Get", {
                    typeName: "Defect",
                    search: { defectListSearch: { id: defectListId } }
                }, function(defects) {
                    if (!defects || defects.length === 0) {
                        elDefectsList.innerHTML = '<li style="padding: 12px 0;">No se encontraron defectos.</li>';
                        elLoading.style.display = 'none';
                        elInspectionForm.style.display = 'block';
                        return;
                    }
                    
                    defects.forEach(defect => {
                        const li = document.createElement('li');
                        li.style.padding = '12px 0';
                        li.style.borderBottom = '1px solid #eee';
                        li.style.display = 'flex';
                        li.style.alignItems = 'center';
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.id = 'defect-' + defect.id;
                        checkbox.value = defect.id;
                        checkbox.classList.add('defect-checkbox');
                        checkbox.style.width = '24px';
                        checkbox.style.height = '24px';
                        checkbox.style.marginRight = '15px';
                        
                        const label = document.createElement('label');
                        label.htmlFor = 'defect-' + defect.id;
                        label.textContent = defect.name;
                        
                        li.appendChild(checkbox);
                        li.appendChild(label);
                        
                        elDefectsList.appendChild(li);
                    });
                    
                    elLoading.style.display = 'none';
                    elInspectionForm.style.display = 'block';
                }, function(error) {
                    showError("Error cargando defectos: " + (error.message || error));
                });
            };

            const submitDVIR = (isSafe) => {
                elInspectionForm.style.display = 'none';
                elLoading.style.display = 'block';
                
                let defectLog = {
                    device: { id: currentDevice.id },
                    driver: { id: currentDriver.id },
                    dateTime: new Date().toISOString(),
                    isSafeToOperate: isSafe
                };

                let remark = document.getElementById('inspection-comments').value;
                if(remark) {
                   defectLog.remark = remark; 
                }

                if (!isSafe) {
                    const selectedDefects = Array.from(document.querySelectorAll('.defect-checkbox:checked'))
                        .map(cb => ({
                            defect: { id: cb.value },
                            repairStatus: "NotRepaired"
                        }));
                    
                    if(selectedDefects.length === 0) {
                         showError("Selecciona al menos un defecto.");
                         return;
                    }
                    defectLog.defectRepairs = selectedDefects;
                }

                api.call("Add", {
                    typeName: "DVIRLog",
                    entity: defectLog
                }, function(result) {
                    elLoading.style.display = 'none';
                    elSuccessMessage.style.display = 'block';
                }, function(error) {
                    showError("No se pudo enviar la inspección: " + (error.message || error));
                });
            };

            const showError = (msg) => {
                elLoading.style.display = 'none';
                elInspectionForm.style.display = 'none';
                elErrorText.textContent = msg;
                elErrorMessage.style.display = 'block';
            };

            return {
                initialize: function (api, state, callback) {
                    elVehicleName = document.getElementById('vehicle-name');
                    elLoading = document.getElementById('loading');
                    elInspectionForm = document.getElementById('inspection-form');
                    elDefectsContainer = document.getElementById('defects-container');
                    elDefectsList = document.getElementById('defects-list');
                    elSuccessMessage = document.getElementById('success-message');
                    elErrorMessage = document.getElementById('error-message');
                    elErrorText = document.getElementById('error-text');

                    document.getElementById('btn-show-defects').addEventListener('click', () => {
                        elDefectsContainer.style.display = 'block';
                        document.getElementById('btn-show-defects').style.display = 'none';
                    });
                    
                    document.getElementById('btn-safe').addEventListener('click', () => {
                        if(confirm("¿Confirmas que el vehículo es seguro y no tiene defectos?")) {
                            submitDVIR(true);
                        }
                    });
                    
                    document.getElementById('btn-submit-defects').addEventListener('click', () => {
                        submitDVIR(false);
                    });
                    
                    document.getElementById('btn-reset').addEventListener('click', () => {
                        document.getElementById('btn-show-defects').style.display = 'block';
                        elDefectsContainer.style.display = 'none';
                        Array.from(document.querySelectorAll('.defect-checkbox')).forEach(cb => cb.checked = false);
                        document.getElementById('inspection-comments').value = '';
                        elSuccessMessage.style.display = 'none';
                        elInspectionForm.style.display = 'block';
                    });
                    
                    document.getElementById('btn-retry').addEventListener('click', () => {
                        elErrorMessage.style.display = 'none';
                        elInspectionForm.style.display = 'block';
                    });

                    callback();
                },
                focus: function (api, state) {
                    currentDevice = state.device || (state.deviceInfo && state.deviceInfo.device) || state.activeDevice || state.activeVehicle;

                    elSuccessMessage.style.display = 'none';
                    elErrorMessage.style.display = 'none';
                    elInspectionForm.style.display = 'none';
                    elLoading.style.display = 'block';

                    if (!currentDevice || !currentDevice.id) {
                        elVehicleName.innerHTML = 'No hay un vehículo seleccionado.<br><small style="font-size:12px;">Selecciona un vehículo en Drive primero.</small>';
                        elLoading.style.display = 'none';
                        return;
                    }

                    // Intentar obtener conductor del estado primero
                    currentDriver = state.driver || (state.deviceInfo && state.deviceInfo.driver);

                    // Si no está en el estado, obtener el usuario logueado via API
                    var loadApp = function(driverObj) {
                        currentDriver = driverObj;

                        api.call('Get', {
                            typeName: 'Device',
                            search: { id: currentDevice.id }
                        }, function(devices) {
                            if (devices && devices.length > 0) {
                                elVehicleName.textContent = devices[0].name || 'Vehículo ' + currentDevice.id;
                            } else {
                                elVehicleName.textContent = 'Vehículo ' + currentDevice.id;
                            }
                        }, function() {
                            elVehicleName.textContent = 'Vehículo ' + currentDevice.id;
                        });

                        renderDefects();
                    };

                    if (currentDriver && currentDriver.id) {
                        loadApp(currentDriver);
                    } else {
                        // Fallback: obtener el usuario logueado actual
                        api.call('Get', {
                            typeName: 'User',
                            search: { name: state.userName || '' }
                        }, function(users) {
                            if (users && users.length > 0) {
                                loadApp({ id: users[0].id });
                            } else {
                                // Último recurso: buscar conductores activos en el vehículo
                                api.call('Get', {
                                    typeName: 'DriverChange',
                                    search: {
                                        deviceSearch: { id: currentDevice.id },
                                        fromDate: new Date(Date.now() - 3600000).toISOString()
                                    }
                                }, function(changes) {
                                    if (changes && changes.length > 0) {
                                        loadApp(changes[0].driver);
                                    } else {
                                        // Sin conductor: usar un ID de conductor desconocido estándar de Geotab
                                        loadApp({ id: 'UnknownDriverId' });
                                    }
                                }, function() {
                                    loadApp({ id: 'UnknownDriverId' });
                                });
                            }
                        }, function() {
                            loadApp({ id: 'UnknownDriverId' });
                        });
                    }
                },
                blur: function (api, state) {}
            };
        };
        // Alias de compatibilidad
        geotab.addin.DriveDVIR = geotab.addin.DriveAppLink;
    </script>
</body>
</html>
